<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Tournament Scorer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #f59e0b;
    --accent2: #10b981;
    --red: #ef4444;
    --text: #f1f5f9;
    --muted: #64748b;
    --border: #1e293b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #0a0e1a 0%, #1a1025 100%);
    border-bottom: 2px solid var(--accent);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(245,158,11,0.4);
  }

  header span {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    gap: 8px;
    padding: 12px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  nav button {
    padding: 8px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    transition: all 0.2s;
  }

  nav button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  nav button:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  main { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }
  .page { display: none; }
  .page.active { display: block; }

  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .config-panel h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .config-row {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .config-field { display: flex; flex-direction: column; gap: 6px; }
  .config-field label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; }

  .config-field input[type=number] {
    width: 110px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-field input[type=number]:focus { border-color: var(--accent); }

  .config-hint {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 10px 16px;
    border-radius: 0 8px 8px 0;
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .config-hint strong { color: var(--text); }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .group-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .grp-badge {
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 0.82rem;
    font-weight: 700;
    color: #000;
  }

  .team-list { display: flex; flex-direction: column; gap: 6px; }

  .team-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border-radius: 7px;
    padding: 7px 10px;
  }

  .team-num {
    background: var(--border);
    color: var(--muted);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .team-item input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
  }

  .btn {
    padding: 11px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #d97706; transform: translateY(-1px); }
  .btn-danger { background: #1f2937; color: var(--red); border: 1px solid var(--red); }
  .btn-sm { padding: 6px 14px; font-size: 0.82rem; border-radius: 6px; }

  .flex { display: flex; align-items: center; }
  .gap { gap: 12px; }
  .mt { margin-top: 16px; }
  .mb { margin-bottom: 16px; }

  .match-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .match-controls select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
  }

  .matches-list { display: flex; flex-direction: column; gap: 8px; }

  .match-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .match-row.played { border-left: 3px solid var(--accent2); }
  .match-row.pending { border-left: 3px solid var(--border); }

  .match-num { font-size: 0.72rem; color: var(--muted); width: 32px; flex-shrink: 0; font-weight: 700; }

  .match-teams { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 200px; }

  .team-name { flex: 1; font-weight: 500; font-size: 0.9rem; }
  .team-name.right { text-align: right; }

  .grp-tag {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    color: #000;
    margin-right: 4px;
  }

  .vs { color: var(--muted); font-size: 0.82rem; font-weight: 700; flex-shrink: 0; }

  .score-inputs { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .score-inputs input {
    width: 48px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    text-align: center;
    padding: 6px 4px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
  }

  .score-inputs input:focus { outline: none; border-color: var(--accent); }
  .score-sep { color: var(--muted); }

  .save-btn {
    background: var(--accent2);
    color: #000;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    flex-shrink: 0;
  }

  .save-btn:hover { background: #059669; }

  .edit-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    flex-shrink: 0;
  }

  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-done { background: var(--accent2); }
  .dot-pending { background: var(--border); }

  .standings-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); }
  .standings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }

  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-card .val { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--accent); }
  .stat-card .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .standings-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  .standings-table th { background: var(--surface2); padding: 11px 14px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; }
  .standings-table td { padding: 11px 14px; border-top: 1px solid var(--border); font-size: 0.88rem; }
  .standings-table tr:hover td { background: var(--surface2); }

  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; font-weight: 700; font-size: 0.82rem; }
  .rank-1 { background: #ffd700; color: #000; }
  .rank-2 { background: #c0c0c0; color: #000; }
  .rank-3 { background: #cd7f32; color: #000; }
  .rank-other { background: var(--border); color: var(--muted); }

  .pts { font-weight: 700; font-size: 0.95rem; color: var(--accent); }
  .diff-pos { color: var(--accent2); font-weight: 600; }
  .diff-neg { color: var(--red); font-weight: 600; }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; }

  .info-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; font-size: 0.88rem; color: var(--muted); line-height: 1.6; }
  .info-box strong { color: var(--text); }

  .section-label { font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }

  @media (max-width: 700px) {
    main { padding: 14px; }
    header { padding: 12px 16px; }
    nav { padding: 10px 14px; overflow-x: auto; }
    .standings-table th, .standings-table td { padding: 8px 8px; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🏸 Shuttle Score</h1>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
    <span id="header-info">Badminton Tournament</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--muted)">
      <span id="sync-dot" style="width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;transition:background 0.3s"></span>
      <span id="sync-text">Not connected</span>
    </span>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('setup')">⚙️ Setup</button>
  <button onclick="showPage('matches')">🎯 Matches</button>
  <button onclick="showPage('standings')">🏆 Standings</button>
</nav>

<main>

  <!-- SETUP PAGE -->
  <div id="page-setup" class="page active">

    <div class="config-panel">
      <h2>⚙️ Step 1 — Tournament Configuration</h2>
      <div class="config-row">
        <div class="config-field">
          <label>Number of Teams</label>
          <input type="number" id="cfg-teams" min="2" max="64" value="16" oninput="updateConfigHint()" />
        </div>
        <div class="config-field">
          <label>Number of Groups</label>
          <input type="number" id="cfg-groups" min="2" max="16" value="2" oninput="updateConfigHint()" />
        </div>
        <button class="btn btn-primary" onclick="applyConfig()">→ Set Up Teams</button>
      </div>
      <div class="config-hint" id="cfg-hint">Loading...</div>
    </div>

    <div id="setup-teams-section" style="display:none">
      <div class="section-label mb">Step 2 — Name Your Teams</div>
      <div class="groups-grid" id="groups-grid"></div>
      <div class="flex gap mt">
        <button class="btn btn-primary" onclick="saveTeams()">💾 Save & Generate Matches</button>
        <button class="btn btn-danger btn-sm" onclick="resetAll()">🔄 Reset All</button>
      </div>
    </div>

  </div>

  <!-- MATCHES PAGE -->
  <div id="page-matches" class="page">
    <div class="match-controls">
      <span style="font-weight:700;font-size:0.95rem">Filter:</span>
      <select id="group-filter" onchange="renderMatches()">
        <option value="all">All Matchups</option>
      </select>
      <select id="status-filter" onchange="renderMatches()">
        <option value="all">All Matches</option>
        <option value="pending">Pending</option>
        <option value="played">Played</option>
      </select>
      <span id="match-progress" style="margin-left:auto;color:var(--muted);font-size:0.82rem;"></span>
      <button class="btn btn-sm" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border)" onclick="pullFromSheet()">☁️ Sync</button>
    </div>
    <div class="matches-list" id="matches-list"></div>
  </div>

  <!-- STANDINGS PAGE -->
  <div id="page-standings" class="page">
    <div class="standings-header">
      <div class="standings-title">🏆 Overall Standings</div>
      <button class="btn btn-sm" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border)" onclick="renderStandings()">↻ Refresh</button>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="section-label mb" id="standings-label">ALL TEAMS</div>
    <table class="standings-table">
      <thead>
        <tr>
          <th>#</th><th>Team</th><th>Grp</th>
          <th>P</th><th>W</th><th>L</th>
          <th>PF</th><th>PA</th><th>Diff</th><th>Pts</th>
        </tr>
      </thead>
      <tbody id="standings-body"></tbody>
    </table>
  </div>

</main>

<script>
// ── STATE ────────────────────────────────────────────────────
// groups: array of string arrays  e.g. [["Team A1","Team A2"...],["Team B1"...]]
// matches: [{id, g1, t1, g2, t2, s1, s2}]
let groups = [];
let matches = [];

const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const COLORS = [
  '#f59e0b','#10b981','#3b82f6','#a855f7',
  '#ef4444','#06b6d4','#f97316','#84cc16',
  '#ec4899','#14b8a6','#8b5cf6','#eab308'
];

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyuTyYRRX0E2QW0B7frlIqccizQaqRVJg2HF6HaG-Tlxl7KK0voa-s00ALYnG7cjsR1/exec';

// ── SYNC STATUS ──────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (txt) txt.textContent = msg;
  if (dot) dot.style.background = state === 'ok' ? '#10b981' : state === 'saving' ? '#f59e0b' : '#ef4444';
}

// ── SHEET PUSH (save scores to Google Sheet) ─────────────────
async function pushToSheet() {
  setSyncStatus('saving', 'Saving to Sheet…');
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveAll', matches })
    });
    setSyncStatus('ok', '☁️ Sheet saved ✓');
  } catch(e) {
    setSyncStatus('error', '⚠️ Sheet save failed');
  }
}

// ── SHEET PULL (load scores from Google Sheet) ───────────────
async function pullFromSheet() {
  if (matches.length === 0) return;
  setSyncStatus('saving', 'Loading from Sheet…');
  try {
    const res = await fetch(SHEET_URL + '?t=' + Date.now());
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length === 0) {
      setSyncStatus('ok', '☁️ Connected');
      return;
    }
    rows.forEach(row => {
      const m = matches.find(x => x.id == row.id);
      if (!m) return;
      m.s1 = (row.s1 === '' || row.s1 === null || row.s1 === undefined) ? null : Number(row.s1);
      m.s2 = (row.s2 === '' || row.s2 === null || row.s2 === undefined) ? null : Number(row.s2);
    });
    localStorage.setItem('shuttle_v3', JSON.stringify({ groups, matches }));
    renderMatches();
    renderStandings();
    setSyncStatus('ok', '☁️ Synced from Sheet ✓');
  } catch(e) {
    setSyncStatus('error', '⚠️ Could not reach Sheet');
  }
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('shuttle_v3');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      groups = s.groups;
      matches = s.matches;
      document.getElementById('cfg-teams').value = groups.flat().length;
      document.getElementById('cfg-groups').value = groups.length;
      renderSetupGroups();
      document.getElementById('setup-teams-section').style.display = 'block';
      // Pull latest scores from Google Sheet on page load
      pullFromSheet();
    } catch(e) { localStorage.removeItem('shuttle_v3'); }
  }
  updateConfigHint();
  buildGroupFilter();
  renderMatches();
  renderStandings();
  updateHeaderInfo();
}

function persist() {
  localStorage.setItem('shuttle_v3', JSON.stringify({ groups, matches }));
}

// ── NAV ──────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['setup','matches','standings'][i] === name);
  });
  if (name === 'matches') renderMatches();
  if (name === 'standings') renderStandings();
}

// ── CONFIG ───────────────────────────────────────────────────
function updateConfigHint() {
  const t = parseInt(document.getElementById('cfg-teams').value) || 0;
  const g = parseInt(document.getElementById('cfg-groups').value) || 0;
  const hint = document.getElementById('cfg-hint');
  if (!t || !g || g > t || g < 2) {
    hint.innerHTML = '<span style="color:var(--red)">⚠️ Enter valid numbers. Groups must be ≥ 2 and ≤ number of teams.</span>';
    return;
  }
  // Calculate group sizes (ceiling divide, distribute remainder)
  const sizes = calcGroupSizes(t, g);
  let totalMatches = 0;
  for (let i = 0; i < g; i++)
    for (let j = i+1; j < g; j++)
      totalMatches += sizes[i] * sizes[j];
  const perGroup = sizes[0];
  hint.innerHTML = `${t} teams ÷ ${g} groups = <strong>~${perGroup} teams per group</strong>. Each group plays every other group. Total matches: <strong>${totalMatches}</strong>.`;
}

function calcGroupSizes(totalTeams, numGroups) {
  const sizes = [];
  let rem = totalTeams;
  for (let i = 0; i < numGroups; i++) {
    const s = Math.ceil(rem / (numGroups - i));
    sizes.push(s);
    rem -= s;
  }
  return sizes;
}

function applyConfig() {
  const t = parseInt(document.getElementById('cfg-teams').value);
  const g = parseInt(document.getElementById('cfg-groups').value);
  if (!t || !g || g > t || t < 2 || g < 2) {
    alert('Please enter valid numbers. You need at least 2 groups and groups cannot exceed teams.');
    return;
  }
  const sizes = calcGroupSizes(t, g);
  groups = sizes.map((size, gi) => {
    const letter = LETTERS[gi] || `G${gi+1}`;
    return Array.from({ length: size }, (_, ti) => `Team ${letter}${ti + 1}`);
  });
  renderSetupGroups();
  document.getElementById('setup-teams-section').style.display = 'block';
}

function renderSetupGroups() {
  document.getElementById('groups-grid').innerHTML = groups.map((grp, gi) => {
    const letter = LETTERS[gi] || `G${gi+1}`;
    const color = COLORS[gi % COLORS.length];
    return `
      <div class="group-card">
        <h3>Group <span class="grp-badge" style="background:${color}">${letter}</span>
          <span style="color:var(--muted);font-size:0.78rem;font-weight:400">${grp.length} teams</span>
        </h3>
        <div class="team-list">
          ${grp.map((name, ti) => `
            <div class="team-item">
              <div class="team-num">${ti+1}</div>
              <input value="${name}" placeholder="Team name" data-gi="${gi}" data-ti="${ti}" />
            </div>
          `).join('')}
        </div>
      </div>`;
  }).join('');
}

function saveTeams() {
  document.querySelectorAll('#groups-grid input').forEach(inp => {
    const gi = parseInt(inp.dataset.gi);
    const ti = parseInt(inp.dataset.ti);
    const letter = LETTERS[gi] || `G${gi+1}`;
    groups[gi][ti] = inp.value.trim() || `Team ${letter}${ti+1}`;
  });
  generateMatches();
  persist();
  updateHeaderInfo();
  buildGroupFilter();
  renderMatches();
  alert(`✅ Saved! ${matches.length} matches generated across ${groups.length} groups.`);
  showPage('matches');
}

function generateMatches() {
  matches = [];
  let id = 1;
  // All inter-group matches: every team in group i plays every team in group j (i < j)
  for (let gi = 0; gi < groups.length; gi++) {
    for (let gj = gi + 1; gj < groups.length; gj++) {
      for (let ti = 0; ti < groups[gi].length; ti++) {
        for (let tj = 0; tj < groups[gj].length; tj++) {
          matches.push({ id: id++, g1: gi, t1: ti, g2: gj, t2: tj, s1: null, s2: null });
        }
      }
    }
  }
}

function resetAll() {
  if (!confirm('Reset everything? All scores and team names will be cleared.')) return;
  groups = []; matches = [];
  localStorage.removeItem('shuttle_v3');
  document.getElementById('setup-teams-section').style.display = 'none';
  document.getElementById('cfg-teams').value = 16;
  document.getElementById('cfg-groups').value = 2;
  updateConfigHint();
  buildGroupFilter();
  renderMatches();
  renderStandings();
  updateHeaderInfo();
}

// ── MATCHES ──────────────────────────────────────────────────
function buildGroupFilter() {
  const sel = document.getElementById('group-filter');
  sel.innerHTML = '<option value="all">All Matchups</option>';
  for (let gi = 0; gi < groups.length; gi++) {
    for (let gj = gi + 1; gj < groups.length; gj++) {
      const la = LETTERS[gi] || `G${gi}`;
      const lb = LETTERS[gj] || `G${gj}`;
      const opt = document.createElement('option');
      opt.value = `${gi}-${gj}`;
      opt.textContent = `Group ${la} vs Group ${lb}`;
      sel.appendChild(opt);
    }
  }
}

function renderMatches() {
  if (matches.length === 0) {
    document.getElementById('matches-list').innerHTML =
      '<div class="info-box">No matches yet. Go to <strong>Setup</strong>, enter your team count and group count, then save teams.</div>';
    document.getElementById('match-progress').textContent = '';
    return;
  }

  const gf = document.getElementById('group-filter').value;
  const sf = document.getElementById('status-filter').value;

  const filtered = matches.filter(m => {
    if (gf !== 'all' && gf !== `${m.g1}-${m.g2}`) return false;
    if (sf === 'pending' && m.s1 !== null) return false;
    if (sf === 'played' && m.s1 === null) return false;
    return true;
  });

  const played = matches.filter(m => m.s1 !== null).length;
  document.getElementById('match-progress').textContent = `${played} / ${matches.length} played`;

  if (filtered.length === 0) {
    document.getElementById('matches-list').innerHTML = '<div class="info-box">No matches match the current filter.</div>';
    return;
  }

  document.getElementById('matches-list').innerHTML = filtered.map(m => {
    const la = LETTERS[m.g1] || `G${m.g1}`;
    const lb = LETTERS[m.g2] || `G${m.g2}`;
    const c1 = COLORS[m.g1 % COLORS.length];
    const c2 = COLORS[m.g2 % COLORS.length];
    const t1name = (groups[m.g1] || [])[m.t1] || '?';
    const t2name = (groups[m.g2] || [])[m.t2] || '?';
    const isPlayed = m.s1 !== null;
    return `
      <div class="match-row ${isPlayed ? 'played' : 'pending'}">
        <div class="match-num">#${m.id}</div>
        <div class="status-dot ${isPlayed ? 'dot-done' : 'dot-pending'}"></div>
        <div class="match-teams">
          <div class="team-name right">
            <span class="grp-tag" style="background:${c1}">${la}</span>${t1name}
          </div>
          <div class="vs">VS</div>
          <div class="team-name">
            <span class="grp-tag" style="background:${c2}">${lb}</span>${t2name}
          </div>
        </div>
        <div class="score-inputs">
          <input type="number" id="s1-${m.id}" value="${m.s1 !== null ? m.s1 : ''}" min="0" placeholder="–" />
          <span class="score-sep">:</span>
          <input type="number" id="s2-${m.id}" value="${m.s2 !== null ? m.s2 : ''}" min="0" placeholder="–" />
        </div>
        <button class="save-btn" onclick="saveScore(${m.id})">Save</button>
        ${isPlayed ? `<button class="edit-btn" onclick="clearScore(${m.id})">Clear</button>` : ''}
      </div>`;
  }).join('');
}

function saveScore(id) {
  const m = matches.find(x => x.id === id);
  const s1 = parseInt(document.getElementById('s1-' + id).value);
  const s2 = parseInt(document.getElementById('s2-' + id).value);
  if (isNaN(s1) || isNaN(s2) || s1 < 0 || s2 < 0) { alert('Enter valid scores for both teams.'); return; }
  m.s1 = s1; m.s2 = s2;
  persist();
  pushToSheet();
  renderMatches();
}

function clearScore(id) {
  const m = matches.find(x => x.id === id);
  m.s1 = null; m.s2 = null;
  persist();
  pushToSheet();
  renderMatches();
}

// ── STANDINGS ────────────────────────────────────────────────
function renderStandings() {
  const totalTeams = groups.flat().length;
  document.getElementById('standings-label').textContent = `ALL ${totalTeams || ''} TEAMS`;

  if (groups.length === 0) {
    document.getElementById('standings-body').innerHTML =
      '<tr><td colspan="10" style="color:var(--muted);padding:20px;text-align:center">Set up your tournament first.</td></tr>';
    document.getElementById('stats-row').innerHTML = '';
    return;
  }

  // Flat stats array, preserving group + index info
  const stats = groups.flatMap((grp, gi) =>
    grp.map((name, ti) => ({ name, gi, ti, P:0, W:0, L:0, PF:0, PA:0 }))
  );

  // Map (gi, ti) → flat index
  const offsets = groups.map((_, gi) => groups.slice(0, gi).reduce((a, g) => a + g.length, 0));
  const key = (gi, ti) => offsets[gi] + ti;

  matches.forEach(m => {
    if (m.s1 === null) return;
    const k1 = key(m.g1, m.t1), k2 = key(m.g2, m.t2);
    stats[k1].P++; stats[k2].P++;
    stats[k1].PF += m.s1; stats[k1].PA += m.s2;
    stats[k2].PF += m.s2; stats[k2].PA += m.s1;
    if (m.s1 > m.s2)      { stats[k1].W++; stats[k2].L++; }
    else if (m.s2 > m.s1) { stats[k2].W++; stats[k1].L++; }
    else                   { stats[k1].W++; stats[k2].W++; }
  });

  stats.forEach(s => { s.pts = s.W * 2; s.diff = s.PF - s.PA; });
  stats.sort((a, b) => b.pts - a.pts || b.diff - a.diff || b.PF - a.PF);

  const totalPlayed = matches.filter(m => m.s1 !== null).length;
  const totalMatches = matches.length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="val">${totalTeams}</div><div class="lbl">Teams</div></div>
    <div class="stat-card"><div class="val">${groups.length}</div><div class="lbl">Groups</div></div>
    <div class="stat-card"><div class="val">${totalMatches}</div><div class="lbl">Total Matches</div></div>
    <div class="stat-card"><div class="val">${totalPlayed}</div><div class="lbl">Played</div></div>
    <div class="stat-card"><div class="val">${totalMatches - totalPlayed}</div><div class="lbl">Remaining</div></div>
    <div class="stat-card"><div class="val">${stats[0] ? stats[0].pts : 0}</div><div class="lbl">Leader Pts</div></div>
  `;

  const maxPts = Math.max(...stats.map(s => s.pts), 1);

  document.getElementById('standings-body').innerHTML = stats.map((s, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
    const diffClass = s.diff > 0 ? 'diff-pos' : s.diff < 0 ? 'diff-neg' : '';
    const letter = LETTERS[s.gi] || `G${s.gi}`;
    const color = COLORS[s.gi % COLORS.length];
    const pct = (s.pts / maxPts * 100).toFixed(1);
    return `
      <tr>
        <td><span class="rank-badge ${rankClass}">${rank}</span></td>
        <td>
          <div style="font-weight:600">${s.name}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </td>
        <td><span class="grp-badge" style="background:${color};padding:2px 7px;border-radius:4px;font-size:0.72rem">${letter}</span></td>
        <td>${s.P}</td>
        <td style="color:var(--accent2)">${s.W}</td>
        <td style="color:var(--red)">${s.L}</td>
        <td>${s.PF}</td>
        <td>${s.PA}</td>
        <td class="${diffClass}">${s.diff > 0 ? '+' : ''}${s.diff}</td>
        <td class="pts">${s.pts}</td>
      </tr>`;
  }).join('');
}

function updateHeaderInfo() {
  const t = groups.flat().length;
  document.getElementById('header-info').textContent =
    t > 0 ? `${t} Teams · ${groups.length} Groups` : 'Badminton Tournament';
}

// ── START ────────────────────────────────────────────────────
init();
</script>
</body>
</html>
